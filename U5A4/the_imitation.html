<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS3 The Imitation</title>

    <link rel="stylesheet" href="imitation_styles.css">
</head>

<body>

<div class="container">

    <!-- Penguins -->
    <div class="box">
        <img src="penguins.jpg" alt="Penguins" class="penguins">
    </div>

    <!-- Football Field -->
<div class="game-container">
    <!-- Top Row: X, then seven O's, then X -->
    <div class="cell x-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell x-icon"><img src="tic-tac-toe_2.png"></div>

    <!-- Middle Row: Side O's with the Field in the center -->
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="field-area">
        <img src="football_field.jpg" alt="Field">
    </div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>

    <!-- Bottom Row: Repeat top row pattern -->
    <div class="cell x-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell o-icon"><img src="tic-tac-toe_2.png"></div>
    <div class="cell x-icon"><img src="tic-tac-toe_2.png"></div>
</div>   
    
    <!-- Dinosaur -->
    <div class="box">
        <img src="dinosaur.png" alt="Dinosaur" class="dino">
    </div>

    <!-- Seagull -->
    <div class="box seagull-box">
        <img src="seagull.png" alt="Seagull" class="seagull">
    </div>

    <!-- Butterfly -->
    <div class="box">
        <img src="butterfly.jpg" alt="Butterfly" class="butterfly">
    </div>

    <!-- Presenting -->
    <div class="box stage-wrapper">
        <img src="theater_stage.jpg" alt="Stage" class="stage">
        <div class="presenting">Presenting</div>
    </div>

</div>

</body>
</html>
