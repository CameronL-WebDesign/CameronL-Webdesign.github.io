<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS3 The Imitation</title>

    <link rel="stylesheet" href="imitation_styles.css">
</head>

<body>

<div class="container">

    <!-- Penguins -->
    <div class="box">
        <img src="penguins.jpg" alt="Penguins" class="penguins">
    </div>

    <!-- Football Field -->
<div class="football-container">
    <img src="football_field.jpg" class="football-field" alt="Field">
</div>
    
<div class="tictactoe-board">
    <div class="tictactoe-cell"><img src="x.png"></div>
    <div class="tictactoe-cell"><img src="o.png"></div>
    <div class="tictactoe-cell"><img src="heart.png"></div>
    </div>
    
    <!-- Dinosaur -->
    <div class="box">
        <img src="dinosaur.png" alt="Dinosaur" class="dino">
    </div>

    <!-- Seagull -->
    <div class="box seagull-box">
        <img src="seagull.png" alt="Seagull" class="seagull">
    </div>

    <!-- Butterfly -->
    <div class="box">
        <img src="butterfly.jpg" alt="Butterfly" class="butterfly">
    </div>

    <!-- Presenting -->
    <div class="box stage-wrapper">
        <img src="theater_stage.jpg" alt="Stage" class="stage">
        <div class="presenting">Presenting</div>
    </div>

</div>

</body>
</html>
