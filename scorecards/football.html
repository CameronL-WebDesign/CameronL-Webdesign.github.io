<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Scorecard</title>

    <!-- Link to External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Detroit Lions Football Scorecard</h1>

    <table>

            <th>Team</th>
            <th>1st Quarter</th>
            <th>2nd Quarter</th>
            <th>3rd Quarter</th>
            <th>4th Quarter</th>
            <th>Total</th>
        </tr>

        <tr>
            <td>Detroit Lions</td>
            <td>7</td>
            <td>10</td>
            <td>3</td>
            <td>14</td>
            <td>34</td>
        </tr>

        <tr>
            <td>Chicago Bears</td>
            <td>3</td>
            <td>7</td>
            <td>0</td>
            <td>10</td>
            <td>20</td>
        </tr>
    </table>

</body>
</html>
