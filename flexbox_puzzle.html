<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flexbox Puzzle</title>

<style>

/* CSS GRID PAGE LAYOUT */
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

.grid-container {
  display: grid;
  grid-template-areas:
    "header"
    "puzzle"
    "footer";
  gap: 10px;
  padding: 10px;
}

.header {
  grid-area: header;
  background: #333;
  color: white;
  text-align: center;
  padding: 15px;
}

.puzzle-section {
  grid-area: puzzle;
  background: #f4f4f4;
  padding: 20px;
  text-align: center;
}

.footer {
  grid-area: footer;
  background: #333;
  color: white;
  text-align: center;
  padding: 10px;
}

/* FLEXBOX PUZZLE */
.puzzle-container {
  display: flex;             
  flex-wrap: wrap;           
  justify-content: center;    
  align-items: center;        

  width: 400px;               
  margin: auto;
}

/* Puzzle pieces */
.piece {
  width: 100px;
  height: 100px;
  border: 1px solid black;
}

/* Hide faulty piece */
.faulty {
  display: none;             
}

</style>
</head>

<body>

<div class="grid-container">

  <!-- Name + Puzzle Title -->
  <header class="header">
    <h1>Cameron</h1>
    <h2>Puzzle: Butterflies</h2>
  </header>

  <!-- Puzzle Section -->
  <section class="puzzle-section">
    <h3>Flexbox Puzzle</h3>

    <div class="puzzle-container">

      <!-- Row 1 -->
      <img src="Puzzle_Images/puzzle1_A.jpg" class="piece">
      <img src="Puzzle_Images/puzzle1_B.jpg" class="piece">
      <img src="Puzzle_Images/puzzle1_C.jpg" class="piece">
      <img src="Puzzle_Images/puzzle1_D.jpg" class="piece">

      <!-- Row 2 -->
      <img src="Puzzle_Images/puzzle1_E.jpg" class="piece">
      <img src="Puzzle_Images/puzzle1_F.jpg" class="piece">
      <img src="Puzzle_Images/puzzle1_G.jpg" class="piece">
      <img src="Puzzle_Images/puzzle1_H.jpg" class="piece">

      <!-- Row 3 -->
      <img src="Puzzle_Images/puzzle1_I.jpg" class="piece">
      <img src="Puzzle_Images/puzzle1_J.jpg" class="piece">
      <img src="Puzzle_Images/puzzle1_K.jpg" class="piece">
      <img src="Puzzle_Images/puzzle1_L.jpg" class="piece">

      <!-- Row 4 -->
      <img src="Puzzle_Images/puzzle1_M.jpg" class="piece">
      <img src="Puzzle_Images/puzzle1_N.jpg" class="piece">
      <img src="Puzzle_Images/puzzle1_O.jpg" class="piece">
      <img src="Puzzle_Images/puzzle1_P.jpg" class="piece">

      <!-- Faulty Piece (hidden) -->
      <img src="Puzzle_Images/puzzle1_Q.jpg" class="piece faulty">

    </div>
  </section>

  <!-- Date -->
  <footer class="footer">
    Completed: May 4, 2026
  </footer>

</div>

</body>
</html>
