<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stylish Schedule</title>

    <style>
        table {
            width: 70%;
            margin: 20px auto;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
        }

        th {
            background-color: #2c3e50;
            color: white;
            padding: 12px;
            font-size: 18px;
        }

        td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: center;
        }

        col.time-col {
            background-color: #dfe6e9;
            width: 30%;
        }

        col.activity-col {
            width: 70%;
        }

        .highlight-row {
            background-color: #ffeaa7;
            font-weight: bold;
        }

        tr:hover {
            background-color: #dff9fb;
        }

        caption {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <table>
        <caption>My Schedule</caption>
        
        <colgroup>
            <col class="time-col">
            <col class="activity-col">
        </colgroup>

        <tr>
            <th>Time</th>
            <th>Activity</th>
        </tr>

        <tr>
            <td>7:00 AM</td>
            <td>Wake up & morning routine</td>
        </tr>

        <tr>
            <td>8:00 AM</td>
            <td>Breakfast</td>
        </tr>

        <tr class="highlight-row">
            <td>9:00 AM</td>
            <td>Online class / studying</td>
        </tr>

        <tr>
            <td>11:00 AM</td>
            <td>Workout session</td>
        </tr>

        <tr>
            <td>12:30 PM</td>
            <td>Lunch</td>
        </tr>

        <tr>
            <td>2:00 PM</td>
            <td>Run errands (shopping, bank)</td>
        </tr>

        <tr>
            <td>4:00 PM</td>
            <td>Work on assignments</td>
        </tr>

        <tr>
            <td>6:30 PM</td>
            <td>Dinner</td>
        </tr>

        <tr>
            <td>8:00 PM</td>
            <td>Relax / watch TV</td>
        </tr>

        <tr>
            <td>10:30 PM</td>
            <td>Prepare for bed</td>
        </tr>

    </table>

</body>
</html>
