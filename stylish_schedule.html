<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stylish Schedule</title>

    <style>
        /* Style the whole table */
        table {
            width: 70%;
            margin: 20px auto;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
        }

        /* Style all table headers */
        th {
            background-color: #2c3e50;
            color: white;
            padding: 12px;
            font-size: 18px;
        }

        /* Style all table cells */
        td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: center;
        }

        /* Style one specific row */
        .highlight-row {
            background-color: #ffeaa7;
            font-weight: bold;
        }

        /* Style one specific column */
        .time-column {
            background-color: #dfe6e9;
            font-weight: bold;
        }

        /* Hover effect for table */
        tr:hover {
            background-color: #dff9fb;
        }

        caption {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <table>
        <caption>My Schedule</caption>
        
        <tr>
            <th class="time-column">Time</th>
            <th>Activity</th>
        </tr>

        <tr>
            <td class="time-column">7:00 AM</td>
            <td>Wake up & morning routine</td>
        </tr>

        <tr>
            <td class="time-column">8:00 AM</td>
            <td>Breakfast</td>
        </tr>

        <tr class="highlight-row">
            <td class="time-column">9:00 AM</td>
            <td>Online class / studying</td>
        </tr>

        <tr>
            <td class="time-column">11:00 AM</td>
            <td>Workout session</td>
        </tr>

        <tr>
            <td class="time-column">12:30 PM</td>
            <td>Lunch</td>
        </tr>

        <tr>
            <td class="time-column">2:00 PM</td>
            <td>Run errands (shopping, bank)</td>
        </tr>

        <tr>
            <td class="time-column">4:00 PM</td>
            <td>Work on assignments</td>
        </tr>

        <tr>
            <td class="time-column">6:30 PM</td>
            <td>Dinner</td>
        </tr>

        <tr>
            <td class="time-column">8:00 PM</td>
            <td>Relax / watch TV</td>
        </tr>

        <tr>
            <td class="time-column">10:30 PM</td>
            <td>Prepare for bed</td>
        </tr>

    </table>

</body>
</html>
